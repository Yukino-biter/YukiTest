spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:yukitest;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
